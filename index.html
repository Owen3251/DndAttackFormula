<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DnD 攻擊字串產生器</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --panel-2: #374151;
      --text: #f9fafb;
      --muted: #d1d5db;
      --accent: #60a5fa;
      --danger: #f87171;
      --ok: #34d399;
      --border: #4b5563;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .app {
      width: 100%;
      max-width: 820px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-weight: 700;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    input[type="number"],
    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      padding: 11px 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.18);
    }

    .checkbox-list {
      display: grid;
      gap: 12px;
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
    }

    .checkbox-row input {
      margin-top: 3px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-title {
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #0b1220;
      background: var(--accent);
    }

    button.secondary {
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .status {
      min-height: 22px;
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
    }

    .error {
      color: var(--danger);
    }

    .success {
      color: var(--ok);
    }

    .preview {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    code {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 5px;
      border-radius: 5px;
    }

    @media (max-width: 680px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>DnD 攻擊字串產生器</h1>
    <p class="subtitle">輸入攻擊次數、爆擊攻擊序號，勾選套用效果後產生可複製的傷害公式字串。</p>

    <section class="card">
      <div class="grid">
        <div class="field">
          <label for="attackCount">攻擊次數</label>
          <input id="attackCount" type="number" min="1" step="1" value="1" />
          <div class="hint">這回合的攻擊次數。必須 ≥ 1。</div>
        </div>

        <div class="field">
          <label for="critRounds">爆擊回和數</label>
          <input id="critRounds" type="text" placeholder="例如：1,3" />
          <div class="hint">哪一些攻擊是爆擊。程式會判斷「爆擊回和數是否包含目前攻擊次數」。使用逗號分隔整數，例如 <code>1,3</code>。</div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="checkbox-list">
        <label class="checkbox-row" for="giantStrengthWater">
          <input id="giantStrengthWater" type="checkbox" />
          <span>
            <span class="checkbox-title">巨人力量之水</span><br />
            <span class="hint">勾選：每次攻擊加 <code>+12</code>；未勾選：每次攻擊加 <code>+8</code>。</span>
          </span>
        </label>

        <label class="checkbox-row" for="enemyCondition">
          <input id="enemyCondition" type="checkbox" />
          <span>
            <span class="checkbox-title">敵方異常效果</span><br />
            <span class="hint">爆擊攻擊加 <code>+2d10</code>；非爆擊攻擊加 <code>+1d10</code>。</span>
          </span>
        </label>

        <label class="checkbox-row" for="lowHp">
          <input id="lowHp" type="checkbox" />
          <span>
            <span class="checkbox-title">自己血量低於1/4</span><br />
            <span class="hint">爆擊攻擊加 <code>+2d4</code>；非爆擊攻擊加 <code>+1d4</code>。</span>
          </span>
        </label>
      </div>
    </section>

    <section class="card">
      <div class="actions">
        <button id="generateBtn" type="button">產生字串</button>
        <button id="copyBtn" class="secondary" type="button">複製</button>
        <button id="clearBtn" class="secondary" type="button">清空爆擊</button>
      </div>

      <div class="field" style="margin-top: 16px;">
        <label for="output">輸出</label>
        <textarea id="output" readonly></textarea>
      </div>

      <div id="status" class="status"></div>
      <div class="preview">
        規則：每次攻擊會產生一段公式；每次都用「爆擊回和數 contains current attack」判斷是否爆擊；多次攻擊用 <code>+</code> 串接，輸出前會移除所有空白。最後額外加上靈能打擊：若爆擊回和數至少有一個值，輸出 <code>+2d6+4</code>，否則輸出 <code>+1d6+4</code>。
      </div>
    </section>
  </main>

  <script>
    const attackCountInput = document.getElementById("attackCount");
    const critRoundsInput = document.getElementById("critRounds");
    const giantStrengthWaterInput = document.getElementById("giantStrengthWater");
    const enemyConditionInput = document.getElementById("enemyCondition");
    const lowHpInput = document.getElementById("lowHp");
    const outputEl = document.getElementById("output");
    const statusEl = document.getElementById("status");

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function parseAttackCount() {
      const value = Number(attackCountInput.value);
      if (!Number.isInteger(value) || value < 1) {
        throw new Error("攻擊次數必須是 ≥ 1 的整數。");
      }
      return value;
    }

    function parseCritRounds(attackCount) {
      const raw = critRoundsInput.value.trim();
      if (!raw) return new Set();

      const parts = raw.split(",").map(x => x.trim()).filter(Boolean);
      const critSet = new Set();

      for (const part of parts) {
        if (!/^\d+$/.test(part)) {
          throw new Error("爆擊回和數只能輸入逗號分隔的整數，例如：1,3。");
        }

        const number = Number(part);
        if (number < 1 || number > attackCount) {
          throw new Error(`爆擊回和數必須介於 1 到 ${attackCount}。錯誤值：${number}`);
        }

        critSet.add(number);
      }

      return critSet;
    }

    function generateAttackFormula(attackIndex, critSet) {
      const isFirstAttack = attackIndex === 1;
      // 判斷：爆擊回和數 contains current attack
      const isCrit = critSet.has(attackIndex);
      const parts = [];

      if (isFirstAttack) {
        parts.push(isCrit ? "4d6kh2" : "2d6kh1");
      } else {
        parts.push(isCrit ? "2d6" : "1d6");
      }

      parts.push(giantStrengthWaterInput.checked ? "+11" : "+8");
      parts.push(isCrit ? "+2d10+2d6" : "+1d10+1d6");

      if (enemyConditionInput.checked) {
        parts.push(isCrit ? "+2d10" : "+1d10");
      }

      if (lowHpInput.checked) {
        parts.push(isCrit ? "+2d4" : "+1d4");
      }

      return parts.join("");
    }

    function generateOutput() {
      try {
        const attackCount = parseAttackCount();
        const critSet = parseCritRounds(attackCount);
        const attackFormulas = [];

        for (let currentAttack = 1; currentAttack <= attackCount; currentAttack++) {
          attackFormulas.push(generateAttackFormula(currentAttack, critSet));
        }

        const psionicStrike = critSet.size >= 1 ? "+2d6+4" : "+1d6+4";
        const result = (attackFormulas.join("+") + psionicStrike).replace(/\s+/g, "");

        outputEl.value = result;
        setStatus("已產生。", "success");
      } catch (error) {
        outputEl.value = "";
        setStatus(error.message, "error");
      }
    }

    async function copyOutput() {
      if (!outputEl.value) {
        setStatus("沒有可複製的輸出。", "error");
        return;
      }

      try {
        await navigator.clipboard.writeText(outputEl.value);
        setStatus("已複製到剪貼簿。", "success");
      } catch (error) {
        outputEl.select();
        document.execCommand("copy");
        setStatus("已複製。", "success");
      }
    }

    document.getElementById("generateBtn").addEventListener("click", generateOutput);
    document.getElementById("copyBtn").addEventListener("click", copyOutput);
    document.getElementById("clearBtn").addEventListener("click", () => {
      critRoundsInput.value = "";
      generateOutput();
    });

    [attackCountInput, critRoundsInput, giantStrengthWaterInput, enemyConditionInput, lowHpInput].forEach(element => {
      element.addEventListener("input", generateOutput);
      element.addEventListener("change", generateOutput);
    });

    generateOutput();
  </script>
</body>
</html>
